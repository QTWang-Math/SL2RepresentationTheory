name = "SL2RepresentationTheory"
version = "0.1.0"
keywords = ["math"]
defaultTargets = ["SL2RepresentationTheory", "Main"]

[leanOptions]
pp.unicode.fun = true # pretty-prints `fun a ↦ b`
relaxedAutoImplicit = false
weak.linter.mathlibStandardSet = true
maxSynthPendingDepth = 3

[[require]]
name = "mathlib"
scope = "leanprover-community"
rev = "v4.32.0"

[[lean_lib]]
name = "SL2RepresentationTheory"

[[lean_exe]]
name = "Main"
root = "Main"
